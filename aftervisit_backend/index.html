<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AfterVisit — AI Post-Visit Care Platform</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#F4F7FA;--bg2:#FFFFFF;--bg3:#EDF1F6;--bg4:#E1E8F0;
  --b1:rgba(15,23,42,.09);--b2:rgba(15,23,42,.15);
  --t1:#101B2E;--t2:#566173;--t3:#8A95A6;
  --teal:#0D9488;--teal2:rgba(13,148,136,.10);--tealB:rgba(13,148,136,.28);
  --blue:#2E7CE6;--blue2:rgba(46,124,230,.10);--blueB:rgba(46,124,230,.26);
  --amber:#D97706;--amber2:rgba(217,119,6,.12);--amberB:rgba(217,119,6,.30);
  --red:#E0364F;--red2:rgba(224,54,79,.10);--redB:rgba(224,54,79,.26);
  --green:#16A34A;--green2:rgba(22,163,74,.10);--greenB:rgba(22,163,74,.26);
}
html,body{height:100%;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:14px;background:var(--bg);color:var(--t1);overflow-x:hidden}
a{color:inherit;text-decoration:none}
button,input,select{font-family:inherit}
input,select{background:var(--bg3);border:1px solid var(--b2);border-radius:8px;padding:10px 13px;color:var(--t1);font-size:13px;outline:none;width:100%;transition:border-color .2s}
input:focus,select:focus{border-color:var(--teal)}
input::placeholder{color:var(--t3)}
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-thumb{background:var(--bg4);border-radius:4px}

/* ── SCREENS ── */
.screen{display:none;min-height:100vh}
.screen.show{display:flex}

/* ── LOGIN ── */
#s-login{align-items:center;justify-content:center;flex-direction:column;background:var(--bg)}
.login-card{background:var(--bg2);border:1px solid var(--b2);border-radius:18px;padding:36px;width:100%;max-width:380px}
.login-logo{font-size:28px;font-weight:700;text-align:center;margin-bottom:4px;letter-spacing:-1px}
.login-logo span{color:var(--teal)}
.login-sub{font-size:12px;color:var(--t3);text-align:center;margin-bottom:28px}
.tab-row{display:grid;grid-template-columns:1fr 1fr;gap:4px;background:var(--bg3);border-radius:10px;padding:3px;margin-bottom:22px}
.tab-btn{padding:9px;border-radius:7px;font-size:12px;font-weight:600;cursor:pointer;border:none;font-family:inherit;transition:all .2s;color:var(--t2);background:transparent}
.tab-btn.on{background:var(--bg4);color:var(--t1)}
.f-label{font-size:10px;font-weight:600;color:var(--t3);text-transform:uppercase;letter-spacing:.08em;margin-bottom:5px;display:block}
.f-group{margin-bottom:13px}
.btn-primary{width:100%;padding:12px;border-radius:10px;border:none;font-size:14px;font-weight:700;cursor:pointer;transition:all .2s;margin-top:4px}
.btn-teal{background:var(--teal);color:#fff}
.btn-teal:hover{opacity:.9}
.btn-blue{background:var(--blue);color:#fff}
.btn-blue:hover{opacity:.9}
.divider{display:flex;align-items:center;gap:10px;margin:14px 0;color:var(--t3);font-size:11px}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--b1)}
.demo-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.demo-btn{padding:10px;border-radius:9px;font-size:12px;font-weight:600;cursor:pointer;border:1px solid;transition:opacity .2s}
.demo-btn:hover{opacity:.85}
.demo-p{background:var(--teal2);color:var(--teal);border-color:var(--tealB)}
.demo-d{background:var(--blue2);color:var(--blue);border-color:var(--blueB)}

/* ── APP SHELL ── */
#s-app{flex-direction:row}
.sidebar{width:220px;background:var(--bg2);border-right:1px solid var(--b1);display:flex;flex-direction:column;height:100vh;position:sticky;top:0;flex-shrink:0}
.sb-head{padding:18px 14px 12px;border-bottom:1px solid var(--b1)}
.sb-logo{font-size:18px;font-weight:700;letter-spacing:-.5px;margin-bottom:10px}
.sb-logo span{color:var(--teal)}
.sb-user{display:flex;align-items:center;gap:8px;padding:8px;background:var(--bg3);border:1px solid var(--b1);border-radius:9px}
.sb-av{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;flex-shrink:0}
.sb-av.p{background:var(--teal2);color:var(--teal);border:1px solid var(--tealB)}
.sb-av.d{background:var(--blue2);color:var(--blue);border:1px solid var(--blueB)}
.sb-uname{font-size:11px;font-weight:600;color:var(--t1)}
.sb-urole{font-size:9px;color:var(--t3)}
.sb-nav{flex:1;padding:10px 8px;overflow-y:auto;display:flex;flex-direction:column;gap:2px}
.sb-sec{font-size:9px;font-weight:600;color:var(--t3);text-transform:uppercase;letter-spacing:.1em;padding:10px 8px 4px}
.nav-item{display:flex;align-items:center;gap:9px;padding:8px 10px;border-radius:8px;cursor:pointer;color:var(--t2);font-size:12px;font-weight:500;border:1px solid transparent;transition:all .18s;user-select:none}
.nav-item svg{width:15px;height:15px;flex-shrink:0;stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}
.nav-item:hover{background:rgba(15,23,42,.05);color:var(--t1)}
.nav-item.on{background:var(--teal2);color:var(--teal);border-color:var(--tealB)}
.nav-item.on.doc{background:var(--blue2);color:var(--blue);border-color:var(--blueB)}
.nav-badge{margin-left:auto;font-size:9px;font-weight:700;padding:1px 6px;border-radius:10px}
.nb-red{background:var(--red);color:#fff}
.nb-teal{background:var(--teal);color:#fff}
.sb-foot{padding:10px 8px;border-top:1px solid var(--b1)}
.app-right{flex:1;display:flex;flex-direction:column;min-height:100vh;overflow-y:auto}
.topbar{height:52px;background:rgba(255,255,255,.82);backdrop-filter:blur(20px);border-bottom:1px solid var(--b1);display:flex;align-items:center;justify-content:space-between;padding:0 22px;position:sticky;top:0;z-index:50;flex-shrink:0}
.topbar-title{font-size:15px;font-weight:600;color:var(--t1)}
.tb-actions{display:flex;gap:8px}
.tb-btn{width:32px;height:32px;border-radius:8px;background:var(--bg3);border:1px solid var(--b1);cursor:pointer;display:flex;align-items:center;justify-content:center;position:relative;color:var(--t2);transition:all .2s}
.tb-btn:hover{border-color:var(--b2);color:var(--t1)}
.tb-btn svg{width:15px;height:15px;stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round}
.tb-dot{position:absolute;top:5px;right:5px;width:6px;height:6px;border-radius:50%;background:var(--red);border:1.5px solid var(--bg)}
.page-wrap{flex:1;padding:22px}
.page{display:none;animation:pgIn .2s ease}
.page.on{display:block}
@keyframes pgIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
.pg-title{font-size:22px;font-weight:700;letter-spacing:-.5px;margin-bottom:2px}
.pg-sub{font-size:12px;color:var(--t2);margin-bottom:18px}

/* ── TAGS ── */
.tag{display:inline-flex;align-items:center;font-size:9px;font-weight:600;padding:2px 8px;border-radius:5px;border:1px solid;white-space:nowrap;letter-spacing:.03em;text-transform:uppercase}
.tg{background:var(--teal2);color:var(--teal);border-color:var(--tealB)}
.tb{background:var(--blue2);color:var(--blue);border-color:var(--blueB)}
.ta{background:var(--amber2);color:var(--amber);border-color:var(--amberB)}
.tr{background:var(--red2);color:var(--red);border-color:var(--redB)}
.tgr{background:var(--green2);color:var(--green);border-color:var(--greenB)}

/* ── CARDS / GRIDS ── */
.card{background:var(--bg2);border:1px solid var(--b1);border-radius:14px;padding:16px}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px}
.g3{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:14px}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:14px}
.mb14{margin-bottom:14px}
.stat-card{background:var(--bg2);border:1px solid var(--b1);border-radius:14px;padding:14px}
.stat-n{font-size:34px;font-weight:700;letter-spacing:-1.5px;line-height:1;margin-bottom:5px}
.stat-l{font-size:11px;color:var(--t2);margin-bottom:4px}
.stat-t{font-size:10px;color:var(--t3);font-weight:500}
.sec-title{font-size:13px;font-weight:700;margin-bottom:12px}

/* ── ALERTS ── */
.alert{display:flex;gap:11px;padding:12px 14px;border-radius:10px;border:1px solid;margin-bottom:14px}
.alert-icon{width:28px;height:28px;border-radius:7px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.alert-icon svg{width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round}
.alert-t{font-size:12px;font-weight:700;margin-bottom:2px}
.alert-d{font-size:11px;line-height:1.55}
.alert-red{background:var(--red2);border-color:var(--redB)}
.alert-red .alert-icon{background:rgba(224,54,79,.18);color:var(--red)}
.alert-red .alert-t{color:var(--red)}
.alert-red .alert-d{color:#C32B45}
.alert-amber{background:var(--amber2);border-color:var(--amberB)}
.alert-amber .alert-icon{background:rgba(217,119,6,.18);color:var(--amber)}
.alert-amber .alert-t{color:var(--amber)}
.alert-amber .alert-d{color:#B45309}

/* ── MEDICINE ROWS ── */
.med-row{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--b1)}
.med-row:last-child{border-bottom:none}
.med-name{font-size:12px;font-weight:600;margin-bottom:2px}
.med-info{font-size:10px;color:var(--t2)}
.med-dose{font-size:10px;font-weight:600;margin-right:8px}
.chk{width:26px;height:26px;border-radius:7px;border:1.5px solid var(--b2);background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s}
.chk svg{width:12px;height:12px;stroke:var(--t3);fill:none;stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round}
.chk.done{background:var(--teal2);border-color:var(--tealB)}
.chk.done svg{stroke:var(--teal)}

/* ── BARS ── */
.bar-row{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.bar-lbl{font-size:11px;color:var(--t2);width:90px;flex-shrink:0}
.bar-track{flex:1;height:5px;background:var(--b2);border-radius:3px;overflow:hidden}
.bar-fill{height:100%;border-radius:3px}
.bar-val{font-size:10px;width:32px;text-align:right;font-weight:600}

/* ── TIMELINE ── */
.tl{display:flex;flex-direction:column}
.tl-item{display:flex;gap:10px;padding-bottom:13px;position:relative}
.tl-item:last-child{padding-bottom:0}
.tl-item::before{content:'';position:absolute;left:7px;top:17px;bottom:0;width:1px;background:var(--b1)}
.tl-item:last-child::before{display:none}
.tl-dot{width:16px;height:16px;border-radius:50%;border:2px solid;flex-shrink:0;z-index:1;background:var(--bg2)}
.tl-body{flex:1}
.tl-title{font-size:12px;font-weight:600;margin-bottom:2px}
.tl-desc{font-size:11px;color:var(--t2);line-height:1.5}
.tl-time{font-size:9px;color:var(--t3);margin-top:3px}

/* ── CHAT ── */
.chat-wrap{display:flex;flex-direction:column;background:var(--bg3);border:1px solid var(--b1);border-radius:14px;overflow:hidden;height:460px}
.chat-hdr{padding:11px 14px;background:var(--bg2);border-bottom:1px solid var(--b1);display:flex;align-items:center;gap:9px;flex-shrink:0}
.chat-av{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.chat-name{font-size:12px;font-weight:700}
.chat-status{font-size:10px;display:flex;align-items:center;gap:5px}
.online-dot{width:5px;height:5px;border-radius:50%;animation:blink 2s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
.chat-msgs{flex:1;padding:13px;overflow-y:auto;display:flex;flex-direction:column;gap:8px}
.msg{max-width:80%;padding:9px 12px;border-radius:11px;font-size:12px;line-height:1.65;border:1px solid}
.msg-ai{background:var(--bg4);border-color:var(--b1);border-radius:3px 11px 11px 11px;align-self:flex-start;color:var(--t1)}
.msg-user{background:var(--teal2);border-color:var(--tealB);border-radius:11px 3px 11px 11px;align-self:flex-end;color:var(--t1)}
.msg-time{font-size:9px;color:var(--t3);margin-top:3px}
.typing{display:flex;gap:4px;padding:9px 12px;background:var(--bg4);border:1px solid var(--b1);border-radius:3px 11px 11px 11px;width:fit-content;align-self:flex-start}
.typing-dot{width:6px;height:6px;border-radius:50%;background:var(--t3);animation:typDot 1.2s ease infinite}
.typing-dot:nth-child(2){animation-delay:.2s}
.typing-dot:nth-child(3){animation-delay:.4s}
@keyframes typDot{0%,80%,100%{transform:scale(.5);opacity:.3}40%{transform:scale(1);opacity:1}}
.qr-wrap{display:flex;gap:5px;flex-wrap:wrap;padding:8px 12px;background:var(--bg2);border-top:1px solid var(--b1);flex-shrink:0}
.qr-btn{font-size:10px;padding:4px 10px;border-radius:12px;border:1px solid var(--b2);background:transparent;color:var(--t2);cursor:pointer;transition:all .15s}
.qr-btn:hover{background:var(--teal2);border-color:var(--tealB);color:var(--teal)}
.chat-inp-row{padding:9px;background:var(--bg2);border-top:1px solid var(--b1);display:flex;gap:7px;flex-shrink:0}
.chat-inp{flex:1;background:var(--bg3);border:1px solid var(--b1);border-radius:9px;padding:9px 12px;font-size:12px;color:var(--t1);outline:none}
.chat-inp:focus{border-color:var(--tealB)}
.chat-inp::placeholder{color:var(--t3)}
.chat-send{background:var(--teal);color:#fff;border:none;border-radius:9px;width:35px;height:35px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:opacity .2s}
.chat-send:hover{opacity:.85}
.chat-send svg{width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}

/* ── LAB TABLE ── */
.lab-row{display:flex;align-items:center;justify-content:space-between;padding:9px 0;border-bottom:1px solid var(--b1)}
.lab-row:last-child{border-bottom:none}
.lab-name{font-size:12px;font-weight:600;margin-bottom:2px}
.lab-range{font-size:10px;color:var(--t3)}
.lab-val{font-size:14px;font-weight:700}

/* ── SYMPTOM ── */
.sym-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-bottom:12px}
.sym-btn{padding:9px;border-radius:9px;border:1px solid var(--b2);background:var(--bg3);color:var(--t2);font-size:11px;font-weight:600;cursor:pointer;text-align:center;transition:all .2s}
.sym-btn:hover,.sym-btn.on{background:var(--teal2);border-color:var(--tealB);color:var(--teal)}
.sym-btn.urg{color:var(--red);border-color:var(--redB)}
.sym-btn.urg:hover,.sym-btn.urg.on{background:var(--red2)}
.sym-result{display:none;border-radius:10px;padding:13px;font-size:12px;line-height:1.7;white-space:pre-line;border:1px solid}

/* ── PATIENT TABLE ── */
.pt-table{width:100%;border-collapse:collapse;table-layout:fixed}
.pt-table th{font-size:10px;font-weight:600;color:var(--t3);text-transform:uppercase;letter-spacing:.06em;padding:0 10px 9px;text-align:left;border-bottom:1px solid var(--b1)}
.pt-table td{padding:10px;border-bottom:1px solid var(--b1);font-size:12px;vertical-align:middle}
.pt-table tr:last-child td{border-bottom:none}
.pt-table tbody tr{cursor:pointer;transition:background .15s}
.pt-table tbody tr:hover td{background:rgba(15,23,42,.035)}
.comp-bar{height:4px;background:var(--b2);border-radius:2px;overflow:hidden;width:70px;margin-top:3px}

/* ── ACTIONS ── */
.act-btn{padding:5px 12px;border-radius:7px;font-size:11px;font-weight:600;cursor:pointer;border:1px solid;transition:opacity .2s}
.act-btn:hover{opacity:.8}
.act-teal{background:var(--teal2);color:var(--teal);border-color:var(--tealB)}
.act-blue{background:var(--blue2);color:var(--blue);border-color:var(--blueB)}
.act-red{background:var(--red2);color:var(--red);border-color:var(--redB)}
.act-grey{background:var(--bg3);color:var(--t2);border-color:var(--b2)}

/* ── HEATMAP ── */
.hm-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px}
.hm-cell{height:26px;border-radius:5px;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:600;border:1px solid}

/* ── SCHEDULE ── */
.sch-row{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid var(--b1)}
.sch-row:last-child{border-bottom:none}
.sch-time{font-size:10px;color:var(--t3);width:50px;flex-shrink:0}

/* ── TRANSCRIPT ── */
.tr-wrap{background:var(--bg3);border:1px solid var(--b1);border-radius:12px;overflow:hidden;margin-bottom:12px}
.tr-hdr{padding:10px 13px;background:var(--bg2);border-bottom:1px solid var(--b1);display:flex;justify-content:space-between;align-items:center}
.tr-msgs{padding:12px;display:flex;flex-direction:column;gap:7px;max-height:200px;overflow-y:auto}
.tr-pt{max-width:80%;padding:7px 10px;border-radius:10px 2px 10px 10px;font-size:11px;line-height:1.6;border:1px solid var(--tealB);background:var(--teal2);align-self:flex-end}
.tr-ai{max-width:80%;padding:7px 10px;border-radius:2px 10px 10px 10px;font-size:11px;line-height:1.6;border:1px solid var(--b1);background:var(--bg4);align-self:flex-start}

/* ── MODAL ── */
.modal-bg{position:fixed;inset:0;background:rgba(15,23,42,.5);backdrop-filter:blur(10px);z-index:200;display:flex;align-items:center;justify-content:center;padding:20px}
.modal-box{background:var(--bg2);border:1px solid var(--b2);border-radius:18px;padding:24px;max-width:500px;width:100%;max-height:80vh;overflow-y:auto;position:relative;animation:pgIn .25s ease}
.modal-close{position:absolute;top:14px;right:14px;width:28px;height:28px;border-radius:7px;background:var(--bg3);border:1px solid var(--b1);cursor:pointer;color:var(--t2);font-size:14px;display:flex;align-items:center;justify-content:center}

/* ── TOAST ── */
.toast{position:fixed;bottom:20px;right:20px;padding:10px 18px;border-radius:10px;font-size:12px;font-weight:600;z-index:999;animation:pgIn .3s ease;pointer-events:none;border:1px solid}
.toast-s{background:var(--teal2);color:var(--teal);border-color:var(--tealB)}
.toast-e{background:var(--red2);color:var(--red);border-color:var(--redB)}

/* ── RING ── */
.ring-wrap{display:flex;flex-direction:column;align-items:center;gap:8px}
.ring-center{margin-top:-64px;text-align:center;position:relative;z-index:1}
.ring-num{font-size:26px;font-weight:700;line-height:1}
.ring-lbl{font-size:10px;color:var(--t2)}
/* light-theme depth */
.card,.stat-card{box-shadow:0 1px 2px rgba(15,23,42,.04),0 4px 12px rgba(15,23,42,.05)}
.login-card{box-shadow:0 12px 34px rgba(15,23,42,.12),0 3px 10px rgba(15,23,42,.06)}
.sidebar{box-shadow:1px 0 4px rgba(15,23,42,.05)}
</style>
</head>
<body>

<!-- LOGIN -->
<div class="screen show" id="s-login">
  <div class="login-card">
    <div class="login-logo">After<span>Visit</span></div>
    <div class="login-sub">AI post-visit patient care · India</div>
    <div class="tab-row">
      <button class="tab-btn on" id="t-signin" onclick="showTab('signin')">Sign In</button>
      <button class="tab-btn" id="t-register" onclick="showTab('register')">Register</button>
    </div>

    <!-- SIGN IN -->
    <div id="form-signin">
      <div class="f-group">
        <label class="f-label">Email or phone</label>
        <input id="l-email" type="text" placeholder="doctor@hospital.com">
      </div>
      <div class="f-group">
        <label class="f-label">Password</label>
        <input id="l-pass" type="password" placeholder="••••••••">
      </div>
      <div class="f-group">
        <label class="f-label">Login as</label>
        <select id="l-role"><option value="patient">Patient</option><option value="doctor">Doctor</option></select>
      </div>
      <button class="btn-primary btn-teal" onclick="doLogin()">Sign In →</button>
      <div class="divider">or try demo</div>
      <div class="demo-grid">
        <button class="demo-btn demo-p" onclick="demoLogin('patient')">Demo Patient</button>
        <button class="demo-btn demo-d" onclick="demoLogin('doctor')">Demo Doctor</button>
      </div>
    </div>

    <!-- REGISTER -->
    <div id="form-register" style="display:none">

function buildNav(r){

  var cfg=r==='patient'?P_NAV:D_NAV;
  cfg.forEach(function(sec){
    var s=document.createElement('div');s.className='sb-sec';s.textContent=sec.sec;nav.appendChild(s);
    sec.items.forEach(function(item){
      var el=document.createElement('div');
      el.className='nav-item'+(r==='doctor'?' doc':'');
      el.id='n-'+item.id;
      el.innerHTML='<svg viewBox="0 0 24 24">'+item.icon+'</svg>'+item.lbl+(item.badge?'<span class="nav-badge '+item.bc+'">'+item.badge+'</span>':'');
      el.onclick=(function(id){return function(){navTo(id);};})(item.id);
      nav.appendChild(el);
    });
  });
}

function navTo(id){
  PAGE=id;
  document.querySelectorAll('.nav-item').forEach(function(el){el.classList.remove('on');});
  var ni=document.getElementById('n-'+id);
  if(ni)ni.classList.add('on');
  document.getElementById('tb-title').textContent=PAGE_TITLES[id]||id;
  var pw=document.getElementById('pages');
  pw.innerHTML='';
  var pg=document.createElement('div');pg.className='page on';pw.appendChild(pg);
  if(id.startsWith('p-'))renderP(id,pg);

function tag(cls,text){return '<span class="tag '+cls+'">'+text+'</span>';}

function stat(label,val,color,trend){return '<div class="stat-card"><div class="stat-l">'+label+'</div><div class="stat-n" style="color:'+color+'">'+val+'</div>'+(trend?'<div class="stat-t">'+trend+'</div>':'')+'</div>';}
function bar(lbl,val,color){return '<div class="bar-row"><div class="bar-lbl">'+lbl+'</div><div class="bar-track"><div class="bar-fill" style="width:'+val+'%;background:'+color+'"></div></div><div class="bar-val" style="color:'+color+'">'+val+'%</div></div>';}
function tlItem(title,desc,time,dotColor){return '<div class="tl-item"><div class="tl-dot" style="border-color:'+dotColor+'"></div><div class="tl-body"><div class="tl-title">'+title+'</div><div class="tl-desc">'+desc+'</div><div class="tl-time">'+time+'</div></div></div>';}

function showToast(msg,t){
  var existing=document.querySelector('.toast');
  if(existing)existing.remove();
  var el=document.createElement('div');
  el.className='toast toast-'+(t==='e'?'e':'s');
  el.textContent=(t==='e'?'':'✓ ')+msg;
  document.body.appendChild(el);
  setTimeout(function(){if(el.parentNode)el.remove();},2500);
}

// ═══ CHAT ═══
function buildChat(inputId,msgsId,isDoc,initMsg,qrs){
  var wrap=document.createElement('div');
  wrap.className='chat-wrap';
  var ac=isDoc?'var(--blue)':'var(--teal)';
  var ac2=isDoc?'var(--blue2)':'var(--teal2)';
  var acB=isDoc?'var(--blueB)':'var(--tealB)';
  wrap.innerHTML='<div class="chat-hdr"><div class="chat-av" style="background:'+ac2+';border:1px solid '+acB+'"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="'+ac+'" stroke-width="2" stroke-linecap="round"><rect x="4" y="4" width="16" height="16" rx="2"/><rect x="9" y="9" width="6" height="6"/><line x1="9" y1="1" x2="9" y2="4"/><line x1="15" y1="1" x2="15" y2="4"/><line x1="9" y1="20" x2="9" y2="23"/><line x1="15" y1="20" x2="15" y2="23"/><line x1="20" y1="9" x2="23" y2="9"/><line x1="20" y1="14" x2="23" y2="14"/><line x1="1" y1="9" x2="4" y2="9"/><line x1="1" y1="14" x2="4" y2="14"/></svg></div><div><div class="chat-name">AfterVisit AI</div><div class="chat-status"><span class="online-dot" style="background:'+ac+'"></span><span style="color:'+ac+'">Claude-powered · 24/7</span></div></div><span class="tag '+(isDoc?'tb':'tg')+'" style="margin-left:auto">Live</span></div>'
    +'<div class="qr-wrap" id="qr-'+inputId+'"></div>'
    +'<div class="chat-msgs" id="'+msgsId+'"><div class="msg msg-ai">'+initMsg+'<div class="msg-time">Ready</div></div></div>'
    +'<div class="chat-inp-row"><input class="chat-inp" id="'+inputId+'" placeholder="'+(isDoc?'Clinical query or patient question...':'Apna sawaal type karein...')+'"><button class="chat-send" id="send-'+inputId+'" style="background:'+ac+'"><svg viewBox="0 0 24 24"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg></button></div>';
  setTimeout(function(){
    var qrWrap=document.getElementById('qr-'+inputId);
    qrs.forEach(function(q){
      var b=document.createElement('button');b.className='qr-btn';b.textContent=q;
      b.onclick=function(){setChat(inputId,q);};
      if(qrWrap)qrWrap.appendChild(b);
    });
    var sendBtn=document.getElementById('send-'+inputId);
    var inp=document.getElementById(inputId);
    if(sendBtn)sendBtn.onclick=function(){sendMsg(inputId,msgsId,isDoc);};
    if(inp)inp.onkeydown=function(e){if(e.key==='Enter')sendMsg(inputId,msgsId,isDoc);};
  },10);
  return wrap;
}

function setChat(inputId,text){
  var inp=document.getElementById(inputId);
  if(inp){inp.value=text;inp.focus();}
}

async function sendMsg(inputId,msgsId,isDoc){
  var inp=document.getElementById(inputId);
  var msgs=document.getElementById(msgsId);
  if(!inp||!msgs)return;
  var text=inp.value.trim();
  if(!text)return;
  var sys=isDoc?D_SYS:P_SYS;
  var t=new Date().toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit'});
  inp.value='';
  var um=document.createElement('div');
  um.className='msg msg-user';
  um.innerHTML=text+'<div class="msg-time">'+t+' ✓✓</div>';
  msgs.appendChild(um);msgs.scrollTop=9999;
  var typing=document.createElement('div');
  typing.className='typing';
  typing.innerHTML='<div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div>';
  msgs.appendChild(typing);msgs.scrollTop=9999;
  try{
    var res=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:600,system:sys,messages:[{role:'user',content:text}]})
    });
    var data=await res.json();
    var reply=(data.content&&data.content[0]&&data.content[0].text)||'Sorry, please try again.';
    if(msgs.contains(typing))msgs.removeChild(typing);
    var am=document.createElement('div');am.className='msg msg-ai';
    am.innerHTML=reply.replace(/\n/g,'<br>')+'<div class="msg-time">'+t+'</div>';
    msgs.appendChild(am);msgs.scrollTop=9999;
  }catch(err){
    if(msgs.contains(typing))msgs.removeChild(typing);
    var em=document.createElement('div');em.className='msg msg-ai';
    em.textContent='Network error. Please try again.';
    msgs.appendChild(em);
  }
}

function buildHeatmap(){
  var hm=document.getElementById('hm');
  if(!hm)return;
  var sts=['g','g','a','g','g','g','g','g','g','g','g','g','g','g','g','a','g','g','g','g','g'];
  for(var d=1;d<=21;d++){
    var s=sts[d-1];
    var cell=document.createElement('div');cell.className='hm-cell';
    if(s==='g'){cell.style.background='var(--green2)';cell.style.borderColor='var(--greenB)';cell.style.color='var(--green)';}
    else if(s==='a'){cell.style.background='var(--amber2)';cell.style.borderColor='var(--amberB)';cell.style.color='var(--amber)';}
    cell.textContent=d;hm.appendChild(cell);
  }
}

// AI SCRIBE
var _recInt=null,_recSec=0;
function initScribe(){}
function startRec(){
  var box=document.getElementById('rec-box');
  var rb=document.getElementById('rec-btn');
  var sb=document.getElementById('stop-btn');
  if(box)box.style.display='block';
  if(rb){rb.disabled=true;rb.style.opacity='.4';}
  if(sb){sb.disabled=false;sb.style.opacity='1';}
  _recSec=0;
  _recInt=setInterval(function(){
    _recSec++;
    var t=document.getElementById('rec-timer');
    if(t)t.textContent=Math.floor(_recSec/60)+':'+((_recSec%60)<10?'0':'')+_recSec%60;
    if(_recSec>=7)stopRec();
  },1000);
}
function stopRec(){
  clearInterval(_recInt);
  var box=document.getElementById('rec-box');
  var rb=document.getElementById('rec-btn');
  var sb=document.getElementById('stop-btn');
  if(box)box.style.display='none';
  if(rb){rb.disabled=false;rb.style.opacity='1';}
  if(sb){sb.disabled=true;sb.style.opacity='.4';}
  var pt=document.getElementById('scribe-pt');
  var ptVal=pt?pt.value:'Rahul Sharma — 10:00 AM';
  var tt=document.getElementById('transcript-box');
  var tx=document.getElementById('transcript-text');
  if(tt)tt.style.display='block';
  if(tx)tx.textContent=(window._SCRIBE_T&&window._SCRIBE_T[ptVal])||'Voice note received. AI processing...';
  setTimeout(function(){
    var sb2=document.getElementById('summary-box');
    var sendBtn=document.getElementById('send-btn');
    var editBtn=document.getElementById('edit-btn');
    var summary=(window._SCRIBE_S&&window._SCRIBE_S[ptVal])||'<strong>Visit Summary Generated!</strong>\n\nAaj ki visit ka complete Hindi summary tayaar ho gaya hai. Patient ke phone pe bhejne ke liye ready hai.';
    if(sb2)sb2.innerHTML='<div style="white-space:pre-line;color:var(--t1)">'+summary.replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>')+'</div>';
    if(sendBtn)sendBtn.style.display='inline-flex';
    if(editBtn)editBtn.style.display='inline-flex';
  },1800);
}
function sendScribeSummary(){
  showToast('Summary sent to patient\'s phone ✓');
  var b=document.getElementById('send-btn');
  if(b){b.textContent='✓ Sent';b.disabled=true;b.style.opacity='.6';}
}
